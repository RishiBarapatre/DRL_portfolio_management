name: drl_portfolio_env
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # Base Python runtime
  - python=3.10
  
  # Core ML and Data Science libraries
  - pytorch=2.5.1
  - torchaudio=2.5.1
  - torchvision=0.15.2
  - cpuonly
  - numpy=1.26.4
  - pandas=2.3.3
  - scikit-learn=1.7.2
  
  # Visualization and UI
  - matplotlib=3.10.7
  - seaborn=0.13.2
  - plotly
  - streamlit
  
  # Financial Data fetching
  - yfinance
  
  # PyPI packages for Deep Reinforcement Learning
  - pip
  - pip:
      - stable-baselines3==2.7.0
      - gym==0.26.2
      - gymnasium==1.2.1
      - shimmy==2.0.0
      - tensorboard==2.20.0